name: Installer smoke

on:
  push:
    branches: [main]
  pull_request:

jobs:
  corpus-and-dryrun:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Bundle Echelon CLI (compile contract)
        run: npm run build:cli
      - name: Installer discovery, dry-run JSON, collision, CLI report-json
        run: |
          npm test --silent \
            tests/detect-corpus.spec.ts \
            tests/dry-run-report.spec.ts \
            tests/classify-repo-precedence.spec.ts \
            tests/route-collision.spec.ts \
            tests/cli-dry-run-report-json.spec.ts
