name: Installer smoke

on:
  push:
    branches: [main]
  pull_request:

jobs:
  corpus-and-dryrun:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Bundle Echelon CLI (compile contract)
        run: npm run build:cli
      - name: Installer discovery, dry-run JSON, collision, CLI report-json, audit facade
        run: |
          npm test --silent \
            tests/detect-corpus.spec.ts \
            tests/detect-supabase-signals.spec.ts \
            tests/runtime-placeholder-scan.spec.ts \
            tests/dev-default-adapters.spec.ts \
            tests/echelon-bootstrap-adapter-guard.spec.ts \
            tests/generate-adapters-output.spec.ts \
            tests/dry-run-report.spec.ts \
            tests/classify-repo-precedence.spec.ts \
            tests/route-collision.spec.ts \
            tests/default-base-path.spec.ts \
            tests/cli-dry-run-report-json.spec.ts \
            tests/gateway-public-facade-audit.spec.ts \
            tests/golden-hybrid-install.spec.ts \
            tests/docs-contract.spec.ts
